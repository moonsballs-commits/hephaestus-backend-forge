services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: jpabackend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jpabackend -d jpabackend"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: